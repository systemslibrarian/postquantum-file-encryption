name: Bug report
description: Report a defect in the library (NOT a security vulnerability — see SECURITY.md)
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        **Security issue?** Stop — do not file it here. Report privately per [SECURITY.md](../../SECURITY.md).
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including the exact exception/message if any.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      description: The smallest code/steps that reproduce it. Do NOT include real passphrases, keys, or sensitive files.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      placeholder: ".NET 10.0.x, OS, architecture"
    validations:
      required: true
