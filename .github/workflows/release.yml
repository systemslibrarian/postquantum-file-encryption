name: Release

# Triggered by pushing a version tag (e.g. v0.1.0). Builds and tests, packs the NuGet package
# and symbols, generates a CycloneDX SBOM, attaches a build-provenance attestation (SLSA-style),
# publishes to NuGet (if NUGET_API_KEY is configured), and creates a GitHub Release with the
# artifacts. Author-signing the NuGet package additionally requires a code-signing certificate
# (see docs); nuget.org applies repository signatures automatically on publish.

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write       # create the GitHub Release
  id-token: write       # provenance attestation (OIDC)
  attestations: write   # provenance attestation

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      # Promoted to job level so the publish step's `if:` can see it (a secret cannot be
      # referenced directly in an `if` expression).
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Verify docs and project versions match the release tag
        # Fail the release before anything is packed or pushed if the version documented to
        # users has drifted from the tag being published. This is the automatic counterpart to
        # the doc sweep that MUST accompany every version bump: it catches the classic mismatch
        # where a .csproj <Version> was raised but a README install snippet or the status line
        # still pins the previous release. Scope is the user-facing surface — packable project
        # versions, every `dotnet add package … --version` snippet in any README, and the root
        # README status line. Historical mentions (CHANGELOG entries, "shipped 1.3.0" prose) are
        # deliberately not matched, because they are facts about earlier releases.
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          echo "Release tag version: ${version}"
          fail=0

          # 1. Every project that declares a <Version> must equal the tag (lockstep family).
          while IFS= read -r csproj; do
            declared="$(grep -oPm1 '(?<=<Version>)[^<]+' "$csproj" || true)"
            if [ -n "$declared" ] && [ "$declared" != "$version" ]; then
              echo "::error file=$csproj::<Version> is '$declared' but the release tag is '$version'"
              fail=1
            fi
          done < <(git ls-files '*.csproj')

          # 2. Every 'dotnet add package … --version X.Y.Z' snippet in any README must pin the tag.
          while IFS= read -r hit; do
            f="${hit%%:*}"
            pinned="$(printf '%s' "$hit" | grep -oP -- '--version \K[0-9][0-9A-Za-z.-]*')"
            if [ "$pinned" != "$version" ]; then
              echo "::error file=$f::install snippet pins '--version $pinned' but the release tag is '$version'"
              fail=1
            fi
          done < <(git grep -nP -- '--version [0-9]' -- '*README.md' || true)

          # 3. The root README status line must name the tag version.
          if ! grep -qP "Status:\s*\`${version}\`" README.md; then
            echo "::error file=README.md::the **Status:** line does not name version '${version}'"
            fail=1
          fi

          if [ "$fail" -ne 0 ]; then
            echo "Documentation/version drift detected — sweep the docs to ${version} before tagging this release." >&2
            exit 1
          fi
          echo "All project and documentation versions match ${version}."

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          # 8.0.x provides the runtime for the net8.0 test leg; 10.0.x is the build SDK.
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Build & test
        run: |
          dotnet build --configuration Release
          dotnet test  --configuration Release --no-build

      - name: Pack
        run: |
          dotnet pack src/PostQuantum.FileEncryption/PostQuantum.FileEncryption.csproj --configuration Release -o artifacts
          dotnet pack src/PostQuantum.FileEncryption.Hybrid/PostQuantum.FileEncryption.Hybrid.csproj --configuration Release -o artifacts
          dotnet pack src/PostQuantum.FileEncryption.Signing/PostQuantum.FileEncryption.Signing.csproj --configuration Release -o artifacts
          dotnet pack src/PostQuantum.FileEncryption.Aws/PostQuantum.FileEncryption.Aws.csproj --configuration Release -o artifacts
          dotnet pack src/PostQuantum.FileEncryption.AzureKeyVault/PostQuantum.FileEncryption.AzureKeyVault.csproj --configuration Release -o artifacts
          dotnet pack src/PostQuantum.FileEncryption.Extensions.DependencyInjection/PostQuantum.FileEncryption.Extensions.DependencyInjection.csproj --configuration Release -o artifacts
          dotnet pack samples/Pqfe.Cli/Pqfe.Cli.csproj --configuration Release -o artifacts

      - name: Validate NuGet packages
        # Structural checks on the produced .nupkg files: deterministic builds, SourceLink wired,
        # README, LICENSE, and icon packed, PDBs valid. Catches malformed packages before they
        # hit nuget.org (where they're effectively immutable). The `Symbols` rule is excluded
        # because symbols ship as a separate .snupkg (IncludeSymbols + SymbolPackageFormat=snupkg).
        run: |
          dotnet tool install --global Meziantou.Framework.NuGetPackageValidation.Tool
          for nupkg in artifacts/*.nupkg; do
            echo "Validating $nupkg"
            meziantou.validate-nuget-package "$nupkg" --excluded-rules Symbols
          done

      - name: Generate SBOMs (CycloneDX)
        run: |
          dotnet tool install --global CycloneDX
          dotnet CycloneDX src/PostQuantum.FileEncryption/PostQuantum.FileEncryption.csproj -o artifacts --json --filename sbom.core.cdx.json
          dotnet CycloneDX src/PostQuantum.FileEncryption.Hybrid/PostQuantum.FileEncryption.Hybrid.csproj -o artifacts --json --filename sbom.hybrid.cdx.json
          dotnet CycloneDX src/PostQuantum.FileEncryption.Signing/PostQuantum.FileEncryption.Signing.csproj -o artifacts --json --filename sbom.signing.cdx.json
          dotnet CycloneDX src/PostQuantum.FileEncryption.Aws/PostQuantum.FileEncryption.Aws.csproj -o artifacts --json --filename sbom.aws.cdx.json
          dotnet CycloneDX src/PostQuantum.FileEncryption.AzureKeyVault/PostQuantum.FileEncryption.AzureKeyVault.csproj -o artifacts --json --filename sbom.azurekeyvault.cdx.json
          dotnet CycloneDX src/PostQuantum.FileEncryption.Extensions.DependencyInjection/PostQuantum.FileEncryption.Extensions.DependencyInjection.csproj -o artifacts --json --filename sbom.di.cdx.json
          dotnet CycloneDX samples/Pqfe.Cli/Pqfe.Cli.csproj -o artifacts --json --filename sbom.tool.cdx.json

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: 'artifacts/*.nupkg'

      - name: Upload artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-artifacts
          path: artifacts/*

      - name: Publish core to NuGet
        # The dependency graph requires the core to be live before Hybrid is pushed: Hybrid's
        # nupkg pins PostQuantum.FileEncryption at the same version (a ProjectReference becomes
        # a same-version PackageReference on pack), and a consumer's restore of Hybrid will fail
        # if it cannot resolve the core. The shell glob would alphabetically order core before
        # Hybrid (".nupkg" sorts before ".Hybrid"), but the order is incidental — make it explicit.
        # Excludes anything matching *Hybrid*, *Signing*, *Aws*, *AzureKeyVault*, *Extensions*,
        # or *Tool* from this step.
        if: ${{ env.NUGET_API_KEY != '' }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in artifacts/PostQuantum.FileEncryption.*.nupkg artifacts/PostQuantum.FileEncryption.*.snupkg; do
            case "$f" in *Hybrid*|*Signing*|*Aws*|*AzureKeyVault*|*Extensions*|*Tool*) continue ;; esac
            echo "Pushing $f"
            dotnet nuget push "$f" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Wait for core to be indexed on nuget.org
        # nuget.org indexing typically completes in seconds but can take a couple of minutes
        # on busy days. Without this probe, a consumer's restore of Hybrid in the immediate
        # post-push window can fail with "unable to resolve PostQuantum.FileEncryption X.Y.Z"
        # even though the package is published — it just isn't queryable yet.
        if: ${{ env.NUGET_API_KEY != '' }}
        run: |
          set -euo pipefail
          # Strip the leading "v" from the tag — e.g. v1.0.0-rc.2 → 1.0.0-rc.2.
          version="${GITHUB_REF_NAME#v}"
          # 90 × 10s = 15 minutes: the v1.2.0 release hit a slow indexing day where the
          # previous 5-minute budget expired with the package published but not yet queryable.
          for i in $(seq 1 90); do
            if curl -fsSL "https://api.nuget.org/v3-flatcontainer/postquantum.fileencryption/index.json" \
                 | grep -Eq "\"${version}\""; then
              echo "Core ${version} is indexed."
              exit 0
            fi
            echo "Core ${version} not yet indexed (attempt $i/90); sleeping 10s..."
            sleep 10
          done
          echo "Core ${version} still not indexed after 15 minutes — refusing to push Hybrid." >&2
          exit 1

      - name: Publish Hybrid to NuGet
        if: ${{ env.NUGET_API_KEY != '' }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in artifacts/PostQuantum.FileEncryption.Hybrid.*.nupkg artifacts/PostQuantum.FileEncryption.Hybrid.*.snupkg; do
            echo "Pushing $f"
            dotnet nuget push "$f" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Publish Signing and the cloud key providers to NuGet
        # Signing, Aws, and AzureKeyVault each pin only the core (same-version
        # PackageReference on pack), so they need the core indexed — already guaranteed
        # above — but have no ordering constraint vs Hybrid or each other.
        if: ${{ env.NUGET_API_KEY != '' }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in artifacts/PostQuantum.FileEncryption.Signing.*.nupkg artifacts/PostQuantum.FileEncryption.Signing.*.snupkg \
                   artifacts/PostQuantum.FileEncryption.Aws.*.nupkg artifacts/PostQuantum.FileEncryption.Aws.*.snupkg \
                   artifacts/PostQuantum.FileEncryption.AzureKeyVault.*.nupkg artifacts/PostQuantum.FileEncryption.AzureKeyVault.*.snupkg; do
            echo "Pushing $f"
            dotnet nuget push "$f" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Wait for Hybrid and Signing to be indexed on nuget.org
        # Same reasoning as the core wait above: the DI extensions nupkg pins the core,
        # Hybrid, AND Signing at the same version, so all three must be queryable before the
        # DI package is pushed or an immediate consumer restore can fail.
        if: ${{ env.NUGET_API_KEY != '' }}
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          # 90 × 10s = 15 minutes per package, matching the core wait above (the v1.2.0
          # release saw nuget.org indexing take longer than the previous 5-minute budget — twice).
          for pkg in postquantum.fileencryption.hybrid postquantum.fileencryption.signing; do
            indexed=0
            for i in $(seq 1 90); do
              if curl -fsSL "https://api.nuget.org/v3-flatcontainer/${pkg}/index.json" \
                   | grep -Eq "\"${version}\""; then
                echo "${pkg} ${version} is indexed."
                indexed=1
                break
              fi
              echo "${pkg} ${version} not yet indexed (attempt $i/90); sleeping 10s..."
              sleep 10
            done
            if [ "$indexed" -ne 1 ]; then
              echo "${pkg} ${version} still not indexed after 15 minutes — refusing to push the DI extensions package." >&2
              exit 1
            fi
          done

      - name: Publish the DI extensions package to NuGet
        if: ${{ env.NUGET_API_KEY != '' }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in artifacts/PostQuantum.FileEncryption.Extensions.DependencyInjection.*.nupkg artifacts/PostQuantum.FileEncryption.Extensions.DependencyInjection.*.snupkg; do
            echo "Pushing $f"
            dotnet nuget push "$f" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Publish the pqfe tool to NuGet
        # The tool bundles the library in its tools/ payload (PackAsTool), so unlike Hybrid
        # it has no package dependency on the core and no indexing-order constraint.
        if: ${{ env.NUGET_API_KEY != '' }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          for f in artifacts/PostQuantum.FileEncryption.Tool.*.nupkg; do
            echo "Pushing $f"
            dotnet nuget push "$f" --api-key "$NUGET_API_KEY" --source https://api.nuget.org/v3/index.json --skip-duplicate
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${GITHUB_REF_NAME}" artifacts/* --title "${GITHUB_REF_NAME}" --notes "See CHANGELOG.md for details."
