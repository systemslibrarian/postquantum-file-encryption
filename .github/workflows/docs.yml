name: API docs

# Builds the DocFX API reference from the library's XML docs and uploads it as an artifact.
# (GitHub Pages currently hosts the browser demo; publishing the docs site there is a separate
# choice — see docfx/ and the README.)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docfx/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: '10.0.x'

      - name: Install DocFX
        run: |
          dotnet tool install -g docfx
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Build API docs
        run: docfx docfx/docfx.json

      - name: Upload site
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: api-docs
          path: docfx/_site
