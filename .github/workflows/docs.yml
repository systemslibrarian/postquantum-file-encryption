name: API docs

# Builds the DocFX API reference from the library's XML docs and uploads it as an artifact.
# (GitHub Pages currently hosts the browser demo; publishing the docs site there is a separate
# choice — see docfx/ and the README.)

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'docfx/**'
      - '.github/workflows/docs.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Install DocFX
        run: |
          dotnet tool install -g docfx
          echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"

      - name: Build API docs
        run: docfx docfx/docfx.json

      - name: Upload site
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: api-docs
          path: docfx/_site
