name: CI

# Runs both test suites on every push and pull request. The .NET library and the Rust → WASM
# browser core implement the same .pqfe format; the cross-implementation tests only protect
# byte-compatibility if BOTH suites run here.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet:
    name: .NET — build & test
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          # 8.0.x provides the runtime for the net8.0 test leg; 10.0.x is the build SDK.
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Restore
        run: dotnet restore

      - name: Build (warnings are errors)
        run: dotnet build --configuration Release --no-restore

      - name: Test (with coverage; default lane, fast)
        # Excludes the LongRunning category so every push stays fast across all three OSes.
        # The fuller long-running lane runs once on Linux below.
        run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category!=LongRunning" --collect:"XPlat Code Coverage" --results-directory "${{ runner.temp }}/coverage"

      - name: Test (LongRunning lane, Linux only)
        # Big-payload tests (e.g. max-chunk-size 16 MiB round-trip) that don't need to run
        # on every OS leg. Always run after the fast lane has already produced coverage data,
        # so this lane writes to a separate directory and doesn't feed Codecov.
        if: matrix.os == 'ubuntu-latest'
        run: dotnet test --configuration Release --no-build --verbosity normal --filter "Category=LongRunning"

      - name: Upload coverage to Codecov
        # Token-free for public repos. Only upload from one matrix leg to avoid double-counting.
        if: matrix.os == 'ubuntu-latest'
        uses: codecov/codecov-action@13ce06bfc6bbe3ecf90edbbf1bc32fe5978ca1d3 # v5.3.1
        with:
          directory: ${{ runner.temp }}/coverage
          fail_ci_if_error: false
          verbose: false

  aot:
    name: .NET — AOT publish smoke test
    # IsAotCompatible=true is set on the core library; this job exercises a real
    # native-AOT publish of the CLI sample and round-trips a file end-to-end so we
    # catch any regression that would slip past the analyzers.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Install AOT prerequisites
        # The .NET native-AOT toolchain on Linux needs clang and zlib headers.
        run: sudo apt-get update && sudo apt-get install -y clang zlib1g-dev

      - name: Publish CLI sample with PublishAot=true
        run: |
          dotnet publish samples/Pqfe.Cli/Pqfe.Cli.csproj \
            --configuration Release \
            -p:PublishAot=true \
            -o "$RUNNER_TEMP/pqfe-aot"

      - name: Round-trip a file with the AOT-published binary
        env:
          PQFE_PASS: 'aot-smoke-test-passphrase'
        run: |
          set -euo pipefail
          PQFE="$RUNNER_TEMP/pqfe-aot/pqfe"
          test -x "$PQFE" || { echo "AOT publish produced no executable at $PQFE"; ls -la "$RUNNER_TEMP/pqfe-aot"; exit 1; }
          echo "the quick brown fox" > "$RUNNER_TEMP/plain.txt"
          "$PQFE" encrypt "$RUNNER_TEMP/plain.txt" "$RUNNER_TEMP/c.pqfe" --passphrase-env PQFE_PASS
          "$PQFE" decrypt "$RUNNER_TEMP/c.pqfe"    "$RUNNER_TEMP/out.txt" --passphrase-env PQFE_PASS
          diff "$RUNNER_TEMP/plain.txt" "$RUNNER_TEMP/out.txt"

  rust:
    name: Rust/WASM — test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust (stable) + wasm target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown

      - name: Test (decrypts the .NET known-answer vectors)
        working-directory: samples/pqfe-wasm
        run: cargo test --release --locked

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build the WebAssembly package
        working-directory: samples/pqfe-wasm
        run: wasm-pack build --target web --release --out-dir ../pqfe-web/pkg

  interop:
    name: Cross-implementation interop (.NET ⇄ Rust)
    # Live byte-compatibility proof: fresh random payloads every run, encrypted by one
    # implementation and decrypted by the other, in both directions, across chunk-boundary
    # sizes. Complements the pinned known-answer vectors, which cannot catch drift on
    # inputs they don't cover. Passphrase key source only — the Rust core does not
    # implement recipient mode (see KNOWN-GAPS.md).
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: '10.0.x'

      - name: Install Rust (stable)
        run: rustup toolchain install stable --profile minimal

      - name: Build the Rust interop driver
        working-directory: samples/pqfe-wasm
        run: cargo build --release --locked --example pqfe_io

      - name: Build the .NET CLI
        run: dotnet publish samples/Pqfe.Cli/Pqfe.Cli.csproj -c Release -o "$RUNNER_TEMP/pqfe-cli"

      - name: Round-trip fresh payloads in both directions
        run: |
          set -euo pipefail
          DOTNET="$RUNNER_TEMP/pqfe-cli/pqfe"
          RUST="samples/pqfe-wasm/target/release/examples/pqfe_io"
          export PQFE_PASS="$(openssl rand -hex 24)"

          # Sizes straddle the 64 KiB chunk boundary plus empty, tiny, and multi-chunk.
          for size in 0 1 65535 65536 65537 5242880; do
            head -c "$size" /dev/urandom > "$RUNNER_TEMP/plain.bin"

            "$DOTNET" encrypt "$RUNNER_TEMP/plain.bin" "$RUNNER_TEMP/dotnet.pqfe" --passphrase-env PQFE_PASS
            "$RUST"   decrypt "$RUNNER_TEMP/dotnet.pqfe" "$RUNNER_TEMP/dotnet.out"
            cmp "$RUNNER_TEMP/plain.bin" "$RUNNER_TEMP/dotnet.out"

            "$RUST"   encrypt "$RUNNER_TEMP/plain.bin" "$RUNNER_TEMP/rust.pqfe"
            "$DOTNET" decrypt "$RUNNER_TEMP/rust.pqfe" "$RUNNER_TEMP/rust.out" --passphrase-env PQFE_PASS
            cmp "$RUNNER_TEMP/plain.bin" "$RUNNER_TEMP/rust.out"

            echo "size $size: both directions OK"
          done

      - name: Argon2id container crosses implementations
        run: |
          set -euo pipefail
          DOTNET="$RUNNER_TEMP/pqfe-cli/pqfe"
          RUST="samples/pqfe-wasm/target/release/examples/pqfe_io"
          export PQFE_PASS="$(openssl rand -hex 24)"

          head -c 100000 /dev/urandom > "$RUNNER_TEMP/plain.bin"
          "$DOTNET" encrypt "$RUNNER_TEMP/plain.bin" "$RUNNER_TEMP/argon.pqfe" --argon2id --passphrase-env PQFE_PASS
          "$RUST"   decrypt "$RUNNER_TEMP/argon.pqfe" "$RUNNER_TEMP/argon.out"
          cmp "$RUNNER_TEMP/plain.bin" "$RUNNER_TEMP/argon.out"
          echo "Argon2id .NET → Rust OK"

      - name: Fail-closed agreement (wrong passphrase rejected by both)
        run: |
          set -euo pipefail
          DOTNET="$RUNNER_TEMP/pqfe-cli/pqfe"
          RUST="samples/pqfe-wasm/target/release/examples/pqfe_io"
          export PQFE_PASS="$(openssl rand -hex 24)"
          export PQFE_WRONG="not-the-passphrase"

          head -c 4096 /dev/urandom > "$RUNNER_TEMP/plain.bin"
          "$DOTNET" encrypt "$RUNNER_TEMP/plain.bin" "$RUNNER_TEMP/c.pqfe" --passphrase-env PQFE_PASS

          if PQFE_PASS="$PQFE_WRONG" "$RUST" decrypt "$RUNNER_TEMP/c.pqfe" "$RUNNER_TEMP/x.out"; then
            echo "Rust accepted a wrong passphrase — fail-closed violation" >&2; exit 1
          fi
          "$RUST" encrypt "$RUNNER_TEMP/plain.bin" "$RUNNER_TEMP/r.pqfe"
          if "$DOTNET" decrypt "$RUNNER_TEMP/r.pqfe" "$RUNNER_TEMP/y.out" --passphrase-env PQFE_WRONG; then
            echo ".NET accepted a wrong passphrase — fail-closed violation" >&2; exit 1
          fi
          echo "Both implementations fail closed on a wrong passphrase"

  audit:
    name: Rust — dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install Rust (stable)
        run: rustup toolchain install stable --profile minimal

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        working-directory: samples/pqfe-wasm
        run: cargo audit
