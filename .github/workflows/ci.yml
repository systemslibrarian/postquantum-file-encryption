name: CI

# Runs both test suites on every push and pull request. The .NET library and the Rust → WASM
# browser core implement the same .pqfe format; the cross-implementation tests only protect
# byte-compatibility if BOTH suites run here.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dotnet:
    name: .NET — build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-dotnet@67a3573c9a986a3f9c594539f4ab511d57bb3ce9 # v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build (warnings are errors)
        run: dotnet build --configuration Release --no-restore

      - name: Test
        run: dotnet test --configuration Release --no-build --verbosity normal

  rust:
    name: Rust/WASM — test & build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust (stable) + wasm target
        run: |
          rustup toolchain install stable --profile minimal
          rustup target add wasm32-unknown-unknown

      - name: Test (decrypts the .NET known-answer vectors)
        working-directory: samples/pqfe-wasm
        run: cargo test --release --locked

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build the WebAssembly package
        working-directory: samples/pqfe-wasm
        run: wasm-pack build --target web --release --out-dir ../pqfe-web/pkg

  audit:
    name: Rust — dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Install Rust (stable)
        run: rustup toolchain install stable --profile minimal

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit dependencies
        working-directory: samples/pqfe-wasm
        run: cargo audit
