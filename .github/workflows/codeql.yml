name: CodeQL

# Static security analysis of the C# library. Uses CodeQL's no-build mode, so it does not
# depend on the .NET 10 SDK being installed on the runner.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '27 3 * * 1' # weekly, Mondays 03:27 UTC

permissions:
  contents: read
  security-events: write

concurrency:
  group: codeql-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze:
    name: Analyze (C#)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@fee9466b8957867761f2d78f922ab084e3e2dd17 # v3
        with:
          languages: csharp
          build-mode: none

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@fee9466b8957867761f2d78f922ab084e3e2dd17 # v3
        with:
          category: "/language:csharp"
